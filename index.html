<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GML Guaianases</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="stylesheet" href="./src/CSS/index.css">
  <script src="./src/js-maps/mapa.js" defer></script>

  <link rel="manifest" href="manifest.json">
</head>

<body>
  <header>
    <h1><img src="./assest/logo.png" alt="Logo do site" width="200px" height="60px"></h1>
            
          
    <div class="menu-container">

      <div class="hamburger" id="hamburger">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>

      <nav class="menu" id="menu">

        <button onclick="findMe()">Minha Localização</button>
        <button onclick="irParaPrefeitura()">Ponto Referencial</button>

        <div class="submenu-container">
          <button id="btnCategorias">Categorias</button>

          <div class="submenu" id="submenuCategorias">
            <a href="saude.html">Saúde</a>
            <a href="cultura.html">Cultura</a>
            <a href="direitos.html">Direitos</a>

          </div>
        </div>
      </nav>

    </div>

  </header>


  <div id="map"></div>

  
  <footer>
    <p>© 2025 Feito por Maria Luiza Mendes, Maria Luisa de Paula e Giovanna Valero</p>
  </footer>

  <script>
    const hamburger = document.getElementById("hamburger");
    const menu = document.getElementById("menu");

    hamburger.addEventListener("click", () => {
      menu.classList.toggle("active");
    });

    const links = menu.querySelectorAll("a");
    links.forEach(link => {
      link.addEventListener("click", () => {
        menu.classList.remove("active");
      });
    });
    //SUBMENU CATEGORIAS
    const btnCategorias = document.getElementById("btnCategorias");
    const submenu = document.getElementById("submenuCategorias");

    btnCategorias.addEventListener("click", (e) => {
      e.stopPropagation(); // evita fechar imediatamente
      submenu.classList.toggle("active");
    });

    // Fecha se clicar fora
    document.addEventListener("click", () => {
      submenu.classList.remove("active");
    });
  </script>

</body>

</html>
